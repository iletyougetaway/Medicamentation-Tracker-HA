add_medication:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: medication_manager
    name:
      required: true
      example: "Vitamin D"
      selector:
        text:
    icon:
      default: "mdi:pill"
      example: "mdi:pill"
      selector:
        icon:
    tag_id:
      example: "04a1b2c3d4e5"
      selector:
        text:
    enabled:
      default: true
      selector:
        boolean:
    reminders:
      default: []
      selector:
        object:

